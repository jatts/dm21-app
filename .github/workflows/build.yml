name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Install OneSignal Capacitor plugin
        run: |
          npm uninstall onesignal-cordova-plugin 2>/dev/null || true
          npm install @onesignal/capacitor-plugin --legacy-peer-deps

      - name: Verify Capacitor plugins
        run: |
          echo "=== Checking plugins ==="
          ls node_modules/@capacitor-community/admob/android/ && echo "✅ AdMob present" || echo "❌ AdMob MISSING"
          ls node_modules/@capacitor-community/text-to-speech/android/ && echo "✅ TTS present" || echo "❌ TTS MISSING"
          ls node_modules/@capacitor/status-bar/android/ && echo "✅ StatusBar present" || echo "❌ StatusBar MISSING"
          ls node_modules/@onesignal/capacitor-plugin/android/ && echo "✅ OneSignal Capacitor plugin present" || echo "❌ OneSignal MISSING"

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Validate capacitor.config.json
        run: |
          python3 -c "
          import json
          with open('capacitor.config.json') as f:
              config = json.load(f)
          if 'appId' not in config:
              config['appId'] = 'com.Rizwan.dm'
              with open('capacitor.config.json', 'w') as f:
                  json.dump(config, f, indent=2)
          print('✅ appId:', config.get('appId'))
          "

      - name: Remove old android
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy google-services.json
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
          else
            echo "❌ google-services.json missing"
            exit 1
          fi

      - name: Set version
        run: |
          sed -i 's/versionCode [0-9]*/versionCode 21/' android/app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "2.1"/' android/app/build.gradle

      - name: Set App Icon
        run: |
          # (same icon generation as before)
          # ... (keep existing icon script) ...

      - name: Add permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          for perm in CAMERA INTERNET ACCESS_NETWORK_STATE VIBRATE POST_NOTIFICATIONS WAKE_LOCK; do
            sed -i "/<manifest/a\    <uses-permission android:name=\"android.permission.$perm\" />" $MANIFEST
          done

      - name: Add AdMob App ID
        run: |
          sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="${{ secrets.ADMOB_APP_ID }}"/>\n</application>|' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dm21-v2.1.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk