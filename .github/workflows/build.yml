name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Clean install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps

    - name: Install @capacitor/push-notifications
      run: |
        npm install @capacitor/push-notifications --legacy-peer-deps

    - name: Verify Capacitor plugins
      run: |
        echo "=== Checking plugins ==="
        ls node_modules/@capacitor-community/admob/android/ 2>/dev/null && echo "✅ AdMob present" || echo "❌ AdMob MISSING"
        ls node_modules/@capacitor-community/text-to-speech/android/ 2>/dev/null && echo "✅ TTS present" || echo "❌ TTS MISSING"
        ls node_modules/@capacitor/status-bar/android/ 2>/dev/null && echo "✅ StatusBar present" || echo "❌ StatusBar MISSING"
        ls node_modules/@capacitor/push-notifications/android/ 2>/dev/null && echo "✅ Push Notifications present" || echo "❌ Push Notifications MISSING"

    - name: Install Capacitor CLI globally
      run: npm install -g @capacitor/cli

    - name: Validate and fix capacitor.config.json
      run: |
        echo "=== Current config ==="
        cat capacitor.config.json
        echo ""
        python3 << 'PYEOF'
        import json, sys, os
        try:
            with open('capacitor.config.json', 'r') as f:
                config = json.load(f)
            print("✅ JSON is valid.")
            if 'appId' not in config:
                print("❌ appId missing, adding it...")
                config['appId'] = 'com.Rizwan.dm'
                if 'appName' not in config:
                    config['appName'] = 'Discount Manager'
                if 'webDir' not in config:
                    config['webDir'] = 'www'
                with open('capacitor.config.json', 'w') as f:
                    json.dump(config, f, indent=2)
                print("✅ Fixed config with appId")
            else:
                print("✅ appId exists:", config['appId'])
        except json.JSONDecodeError as e:
            print("❌ JSON syntax error:", e)
            sys.exit(1)
        PYEOF
        echo "=== After validation ==="
        cat capacitor.config.json

    - name: Remove old android folder
      run: rm -rf android

    - name: Add Android platform
      run: npx @capacitor/cli add android

    - name: Sync Capacitor
      run: npx @capacitor/cli sync android

    # ─── ROBUST MANIFEST PATCHING USING PYTHON TEXT MANIPULATION ───
    - name: Patch AndroidManifest.xml safely
      run: |
        python3 << 'PYEOF'
        import os
        import re

        manifest_path = 'android/app/src/main/AndroidManifest.xml'
        if not os.path.exists(manifest_path):
            print(f"❌ Manifest not found at {manifest_path}")
            exit(1)

        # Read the entire file
        with open(manifest_path, 'r') as f:
            lines = f.readlines()

        # Step 1: Ensure xmlns:android is present in <manifest>
        manifest_line_index = None
        for i, line in enumerate(lines):
            if line.strip().startswith('<manifest'):
                manifest_line_index = i
                if 'xmlns:android' not in line:
                    lines[i] = line.replace('<manifest', '<manifest xmlns:android="http://schemas.android.com/apk/res/android"')
                    print("✅ Added xmlns:android")
                break

        if manifest_line_index is None:
            print("❌ <manifest> tag not found")
            exit(1)

        # Step 2: Add permissions after <manifest> (but before <application>)
        # Collect existing permissions
        existing_perms = set()
        app_line_index = None
        for i, line in enumerate(lines):
            if line.strip().startswith('<application'):
                app_line_index = i
                break
            if line.strip().startswith('<uses-permission'):
                match = re.search(r'android:name="([^"]+)"', line)
                if match:
                    existing_perms.add(match.group(1))

        permissions_to_add = [
            'android.permission.CAMERA',
            'android.permission.INTERNET',
            'android.permission.ACCESS_NETWORK_STATE',
            'android.permission.VIBRATE',
            'android.permission.POST_NOTIFICATIONS',
            'android.permission.WAKE_LOCK'
        ]

        # Insert permissions just after the first <manifest> line (before any <uses-permission>)
        insert_index = manifest_line_index + 1
        for perm in permissions_to_add:
            if perm not in existing_perms:
                lines.insert(insert_index, f'    <uses-permission android:name="{perm}" />\n')
                insert_index += 1
                print(f"✅ Added {perm}")

        if app_line_index is None:
            print("❌ <application> tag not found")
            exit(1)

        # Step 3: Add meta-data inside <application> (after the <application> line)
        # Find the line number of <application> (may have been shifted)
        for i, line in enumerate(lines):
            if line.strip().startswith('<application'):
                app_line_index = i
                break

        # Check which meta-data already exist
        existing_meta = set()
        for line in lines:
            if '<meta-data' in line:
                match = re.search(r'android:name="([^"]+)"', line)
                if match:
                    existing_meta.add(match.group(1))

        # Prepare meta-data lines to insert (with proper indentation)
        meta_lines = []
        if 'com.google.firebase.messaging.default_notification_channel_id' not in existing_meta:
            meta_lines.append('        <meta-data android:name="com.google.firebase.messaging.default_notification_channel_id" android:value="default" />')
        if 'com.google.firebase.messaging.default_notification_icon' not in existing_meta:
            meta_lines.append('        <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:resource="@drawable/ic_launcher" />')
        if 'com.google.android.gms.ads.APPLICATION_ID' not in existing_meta:
            # Use secret or test ID
            admob_id = os.environ.get('ADMOB_APP_ID')
            if not admob_id:
                admob_id = 'ca-app-pub-3940256099942544~3347511713'
                print("⚠️ ADMOB_APP_ID secret not set — using test ID")
            meta_lines.append(f'        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="{admob_id}" />')

        # Insert meta-data after the <application> line (at app_line_index + 1)
        if meta_lines:
            insert_pos = app_line_index + 1
            for meta_line in reversed(meta_lines):  # reverse to maintain order
                lines.insert(insert_pos, meta_line + '\n')
                print(f"✅ Added {meta_line.strip()}")

        # Write back the modified content
        with open(manifest_path, 'w') as f:
            f.writelines(lines)

        print("✅ Manifest patched successfully")

        # Validate XML by parsing with ElementTree (optional)
        try:
            import xml.etree.ElementTree as ET
            ET.parse(manifest_path)
            print("✅ XML validation passed")
        except Exception as e:
            print(f"⚠️ XML validation warning: {e}")

        # Print final manifest for debugging
        print("=== Final AndroidManifest.xml ===")
        with open(manifest_path, 'r') as f:
            print(f.read())
        PYEOF
      env:
        ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}

    - name: Add Firebase Messaging dependency to build.gradle
      run: |
        GRADLE=android/app/build.gradle
        if ! grep -q "firebase-messaging" "$GRADLE"; then
          sed -i '/dependencies {/a\    implementation "com.google.firebase:firebase-messaging:23.4.0"' "$GRADLE"
          echo "✅ Firebase Messaging dependency added"
        else
          echo "ℹ️ Firebase Messaging already present"
        fi

    - name: Copy google-services.json
      run: |
        if [ -f "google-services.json" ]; then
          cp google-services.json android/app/google-services.json
          echo "✅ google-services.json copied"
        else
          echo "❌ google-services.json NOT FOUND"
          exit 1
        fi

    - name: Set Version Code and Version Name
      run: |
        sed -i 's/versionCode [0-9]*/versionCode 21/' android/app/build.gradle
        sed -i 's/versionName "[^"]*"/versionName "2.1"/' android/app/build.gradle
        echo "=== Version check ==="
        grep -E "versionCode|versionName" android/app/build.gradle

    - name: Set App Icon
      run: |
        if [ -f "assets/icon.png" ]; then
          pip install Pillow --quiet
          python3 << 'PYEOF'
        from PIL import Image
        import os

        src = "assets/icon.png"
        img = Image.open(src).convert("RGBA")

        sizes = {
            "mipmap-mdpi": 48, "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96, "mipmap-xxhdpi": 144, "mipmap-xxxhdpi": 192,
        }
        for folder, size in sizes.items():
            d = f"android/app/src/main/res/{folder}"
            os.makedirs(d, exist_ok=True)
            r = img.resize((size, size), Image.LANCZOS)
            r.save(f"{d}/ic_launcher.png")
            r.save(f"{d}/ic_launcher_round.png")
            print(f"✅ {folder}: {size}px")

        def make_fg(img, canvas):
            icon = int(canvas * 0.61)
            pad = (canvas - icon) // 2
            c = Image.new("RGBA", (canvas, canvas), (0,0,0,0))
            c.paste(img.resize((icon,icon), Image.LANCZOS), (pad,pad), img.resize((icon,icon), Image.LANCZOS))
            return c

        fg = {"mipmap-mdpi":108,"mipmap-hdpi":162,"mipmap-xhdpi":216,"mipmap-xxhdpi":324,"mipmap-xxxhdpi":432}
        for folder, size in fg.items():
            d = f"android/app/src/main/res/{folder}"
            os.makedirs(d, exist_ok=True)
            make_fg(img, size).save(f"{d}/ic_launcher_foreground.png")
            print(f"✅ FG {folder}: {size}px")
        PYEOF

          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << 'XML'
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FFFFFF"/>
        </shape>
        XML

          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
        </adaptive-icon>
        XML

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'XML'
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
        </adaptive-icon>
        XML
          echo "✅ Icons set"
        else
          echo "⚠️ No icon found"
        fi

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dm21-v2.1.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk