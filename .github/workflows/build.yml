name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Clean install dependencies (no cache, fresh resolve)
      run: |
        rm -rf node_modules package-lock.json
        npm install

    - name: Verify Capacitor plugins installed
      run: |
        echo "=== Checking node_modules for plugins ==="
        ls node_modules/@capacitor-community/admob/android/ 2>/dev/null && echo "✅ AdMob plugin native code present" || echo "❌ AdMob plugin native code MISSING"
        ls node_modules/@capacitor-community/text-to-speech/android/ 2>/dev/null && echo "✅ TTS plugin native code present" || echo "❌ TTS plugin native code MISSING"
        ls node_modules/@capacitor/status-bar/android/ 2>/dev/null && echo "✅ StatusBar plugin native code present" || echo "❌ StatusBar plugin native code MISSING"

    - name: Install Capacitor CLI globally
      run: npm install -g @capacitor/cli

    - name: Remove old android folder (force fresh generation)
      run: rm -rf android

    - name: Add Android platform
      run: npx @capacitor/cli add android

    - name: Sync Capacitor (registers native plugins)
      run: npx @capacitor/cli sync android

    - name: Set Version Code and Version Name
      run: |
        sed -i 's/versionCode [0-9]*/versionCode 21/' android/app/build.gradle
        sed -i 's/versionName "[^"]*"/versionName "2.1"/' android/app/build.gradle
        echo "=== Version check ==="
        grep -E "versionCode|versionName" android/app/build.gradle

    - name: Set App Icon
      run: |
        if [ -f "assets/icon.png" ]; then
          echo "✅ Icon found, generating all sizes..."
          npm install -g cordova-res
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          npm install -g sharp-cli
          npx sharp -i assets/icon.png -o android/app/src/main/res/mipmap-mdpi/ic_launcher.png resize 48 48
          npx sharp -i assets/icon.png -o android/app/src/main/res/mipmap-hdpi/ic_launcher.png resize 72 72
          npx sharp -i assets/icon.png -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png resize 96 96
          npx sharp -i assets/icon.png -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png resize 144 144
          npx sharp -i assets/icon.png -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png resize 192 192
          # Round icons bhi banao (Android 8.0+)
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          echo "✅ All icon sizes generated"
        else
          echo "⚠️ assets/icon.png not found — default Capacitor icon use hoga"
        fi

    - name: Verify plugins registered in MainActivity / capacitor.config
      run: |
        echo "=== capacitor.config.json (runtime) ==="
        cat android/app/src/main/assets/capacitor.config.json 2>/dev/null || echo "Not found"
        echo ""
        echo "=== Checking generated plugin list ==="
        find android -name "*.java" -path "*capacitor*" | grep -i "admob\|texttospeech\|statusbar" || echo "No plugin Java files found — check above"

    - name: Add Permissions to AndroidManifest
      run: |
        MANIFEST=android/app/src/main/AndroidManifest.xml

        # Camera (barcode scanner + torch)
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.CAMERA" />\
        <uses-feature android:name="android.hardware.camera" android:required="false" />\
        <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />\
        <uses-feature android:name="android.hardware.camera.flash" android:required="false" />' "$MANIFEST"

        # Internet + Network state (DB sync, ads, GitHub Pages load)
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.INTERNET" />\
        <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"

        # Vibration (scan feedback)
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.VIBRATE" />' "$MANIFEST"

        # Notifications (Android 13+ requires runtime permission too)
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"

        # Wake lock (scanner camera ke time screen on rakhne ke liye)
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.WAKE_LOCK" />' "$MANIFEST"

        cat "$MANIFEST"

    - name: Add AdMob App ID to AndroidManifest
      run: |
        sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="${{ secrets.ADMOB_APP_ID }}"/>\n</application>|' android/app/src/main/AndroidManifest.xml

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dm21-v2.1.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
