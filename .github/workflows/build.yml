name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Clean install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install

    - name: Verify Capacitor plugins installed
      run: |
        echo "=== Checking node_modules for plugins ==="
        ls node_modules/@capacitor-community/admob/android/ 2>/dev/null && echo "✅ AdMob plugin native code present" || echo "❌ AdMob plugin native code MISSING"
        ls node_modules/@capacitor-community/text-to-speech/android/ 2>/dev/null && echo "✅ TTS plugin native code present" || echo "❌ TTS plugin native code MISSING"
        ls node_modules/@capacitor/status-bar/android/ 2>/dev/null && echo "✅ StatusBar plugin native code present" || echo "❌ StatusBar plugin native code MISSING"

    - name: Install Capacitor CLI globally
      run: npm install -g @capacitor/cli

    - name: Remove old android folder
      run: rm -rf android

    - name: Add Android platform
      run: npx @capacitor/cli add android

    - name: Sync Capacitor
      run: npx @capacitor/cli sync android

    - name: Set Version Code and Version Name
      run: |
        sed -i 's/versionCode [0-9]*/versionCode 21/' android/app/build.gradle
        sed -i 's/versionName "[^"]*"/versionName "2.0"/' android/app/build.gradle
        echo "=== Version check ==="
        grep -E "versionCode|versionName" android/app/build.gradle

    - name: Verify plugins registered
      run: |
        echo "=== capacitor.config.json (runtime) ==="
        cat android/app/src/main/assets/capacitor.config.json 2>/dev/null || echo "Not found"

    - name: Add Permissions to AndroidManifest
      run: |
        MANIFEST=android/app/src/main/AndroidManifest.xml
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.CAMERA" />\
        <uses-feature android:name="android.hardware.camera" android:required="false" />\
        <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />\
        <uses-feature android:name="android.hardware.camera.flash" android:required="false" />' "$MANIFEST"
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.INTERNET" />\
        <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.VIBRATE" />' "$MANIFEST"
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
        sed -i '/<manifest/a\
        <uses-permission android:name="android.permission.WAKE_LOCK" />' "$MANIFEST"
        cat "$MANIFEST"

    - name: Add AdMob App ID to AndroidManifest
      run: |
        sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="${{ secrets.ADMOB_APP_ID }}"/>\n</application>|' android/app/src/main/AndroidManifest.xml

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Inject App Icon AFTER Gradle build (replaces merged resources)
      run: |
        if [ -f "assets/icon.png" ]; then
          echo "✅ Icon found — injecting into compiled APK resources..."
          pip install Pillow --quiet

          python3 << 'EOF'
        from PIL import Image
        import os, glob

        src = "assets/icon.png"
        img = Image.open(src).convert("RGBA")

        # Gradle merges resources into build/intermediates — find the merged mipmap folders
        # and ALSO replace source res folders (belt + suspenders approach)
        targets = {
            "mipmap-mdpi":    48,
            "mipmap-hdpi":    72,
            "mipmap-xhdpi":   96,
            "mipmap-xxhdpi":  144,
            "mipmap-xxxhdpi": 192,
        }

        replaced = 0
        # Find ALL ic_launcher.png files in android build tree and replace them
        for path in glob.glob("android/**/ic_launcher.png", recursive=True):
            # Skip test/debug folders we don't care about
            folder_name = os.path.basename(os.path.dirname(path))
            size = None
            for key, s in targets.items():
                if key in path:
                    size = s
                    break
            if size:
                resized = img.resize((size, size), Image.LANCZOS)
                resized.save(path)
                replaced += 1
                print(f"✅ Replaced: {path} ({size}x{size})")

        for path in glob.glob("android/**/ic_launcher_round.png", recursive=True):
            folder_name = os.path.basename(os.path.dirname(path))
            size = None
            for key, s in targets.items():
                if key in path:
                    size = s
                    break
            if size:
                resized = img.resize((size, size), Image.LANCZOS)
                resized.save(path)
                replaced += 1
                print(f"✅ Replaced round: {path} ({size}x{size})")

        print(f"\nTotal files replaced: {replaced}")
        EOF
        else
          echo "⚠️ assets/icon.png not found — default Capacitor icon use hoga"
        fi

    - name: Repackage APK with new icons
      run: |
        if [ -f "assets/icon.png" ]; then
          echo "Repackaging APK with updated icons..."
          cd android
          chmod +x gradlew
          # packageDebug sirf APK packaging karta hai — compile skip hoga (cached)
          ./gradlew packageDebug
          echo "✅ APK repackaged with custom icons"
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dm21-v2.1.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
