name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install dependencies
      run: npm install

    - name: Install Capacitor CLI globally
      run: npm install -g @capacitor/cli

    - name: Add Android platform
      run: npx @capacitor/cli add android

    - name: Sync Capacitor
      run: npx @capacitor/cli sync android

    - name: Add AdMob to AndroidManifest
      run: |
        sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="${{ secrets.ADMOB_APP_ID }}"/>\n</application>|' android/app/src/main/AndroidManifest.xml

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dm21-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
